name: Daily YouTube Digest

# Run every day at 9:00 AM London time (UTC+0 / GMT)
# Note: clocks move forward to BST (UTC+1) late March–late October,
# so in summer this fires at 10 AM London time. Adjust cron if needed.
on:
  schedule:
    - cron: '0 9 * * *'  # 9:00 AM UTC

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download processed videos tracker
        uses: actions/download-artifact@v4
        with:
          name: processed-videos
          path: .
        continue-on-error: true  # First run won't have this file

      - name: Run newsletter generator
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Upload processed videos tracker
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos
          path: processed_videos.json
          retention-days: 90
        if: always()  # Save even if newsletter fails
